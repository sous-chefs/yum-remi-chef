---
driver:
  name: vagrant

provisioner:
  name: chef_zero
  product_name: chef
  chef_license: accept-no-persist
  chef_version: <%= ENV['CHEF_VERSION'] || 'current' %>
  multiple_converge: 2
  enforce_idempotency: true
  deprecations_as_errors: true

verifier:
  name: inspec
  sudo: true

platforms:
  - name: almalinux-8
  - name: almalinux-9
  - name: almalinux-10
  - name: centos-stream-9
  - name: rockylinux-8
  - name: rockylinux-9

x-run_lists:
  remi: &remi_run_list
    - recipe[test::remi]
  remi_test: &remi_test_run_list
    - recipe[test::remi_test]
  remi_modular: &remi_modular_run_list
    - recipe[test::remi_modular]
  remi_php72: &remi_php72_run_list
    - recipe[test::remi_php72]
  remi_php73: &remi_php73_run_list
    - recipe[test::remi_php73]
  remi_php74: &remi_php74_run_list
    - recipe[test::remi_php74]
  remi_php80: &remi_php80_run_list
    - recipe[test::remi_php80]
  remi_php81: &remi_php81_run_list
    - recipe[test::remi_php81]
  remi_php82: &remi_php82_run_list
    - recipe[test::remi_php82]
  remi_php83: &remi_php83_run_list
    - recipe[test::remi_php83]
  remi_php84: &remi_php84_run_list
    - recipe[test::remi_php84]

x-verifiers:
  remi: &remi_verifier
    inspec_tests:
      - path: test/integration/remi
  remi_test: &remi_test_verifier
    inspec_tests:
      - path: test/integration/remi_test
  remi_modular: &remi_modular_verifier
    inspec_tests:
      - path: test/integration/remi_modular
  remi_php72: &remi_php72_verifier
    inspec_tests:
      - path: test/integration/php
    inputs:
      version: '7.2'
  remi_php73: &remi_php73_verifier
    inspec_tests:
      - path: test/integration/php
    inputs:
      version: '7.3'
  remi_php74: &remi_php74_verifier
    inspec_tests:
      - path: test/integration/php
    inputs:
      version: '7.4'
  remi_php80: &remi_php80_verifier
    inspec_tests:
      - path: test/integration/php
    inputs:
      version: '8.0'
  remi_php81: &remi_php81_verifier
    inspec_tests:
      - path: test/integration/php
    inputs:
      version: '8.1'
  remi_php82: &remi_php82_verifier
    inspec_tests:
      - path: test/integration/php
    inputs:
      version: '8.2'
  remi_php83: &remi_php83_verifier
    inspec_tests:
      - path: test/integration/php
    inputs:
      version: '8.3'
  remi_php84: &remi_php84_verifier
    inspec_tests:
      - path: test/integration/php
    inputs:
      version: '8.4'

suites:
  - name: remi
    run_list: *remi_run_list
    verifier: *remi_verifier

  - name: remi-test
    run_list: *remi_test_run_list
    verifier: *remi_test_verifier

  - name: remi-modular
    run_list: *remi_modular_run_list
    verifier: *remi_modular_verifier

  - name: remi-php72
    run_list: *remi_php72_run_list
    verifier: *remi_php72_verifier
    excludes:
      - almalinux-9
      - almalinux-10
      - centos-stream-9
      - rockylinux-8
      - rockylinux-9

  - name: remi-php73
    run_list: *remi_php73_run_list
    verifier: *remi_php73_verifier
    excludes:
      - almalinux-9
      - almalinux-10
      - centos-stream-9
      - rockylinux-8
      - rockylinux-9

  - name: remi-php74
    run_list: *remi_php74_run_list
    verifier: *remi_php74_verifier

  - name: remi-php80
    run_list: *remi_php80_run_list
    verifier: *remi_php80_verifier

  - name: remi-php81
    run_list: *remi_php81_run_list
    verifier: *remi_php81_verifier

  - name: remi-php82
    run_list: *remi_php82_run_list
    verifier: *remi_php82_verifier

  - name: remi-php83
    run_list: *remi_php83_run_list
    verifier: *remi_php83_verifier

  - name: remi-php84
    run_list: *remi_php84_run_list
    verifier: *remi_php84_verifier
